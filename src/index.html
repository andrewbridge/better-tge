<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>better TGE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f4ece1">
  <meta name="description" content="Unofficial browser for The Great Escape festival line-up.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png" sizes="192x192" type="image/png">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="better TGE">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Newsreader:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f4ece1;
      --ink: #1a1a1a;
      --hot: #ff3b3f;
      --muted: #6b6258;
      --rule: #1a1a1a;
      --tint: #e8dec9;
      --tint-2: #d9cbab;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--paper); color: var(--ink); }
    body {
      min-height: 100vh;
      font-family: 'Newsreader', Georgia, serif;
      font-size: 16px;
      line-height: 1.4;
      -webkit-font-smoothing: antialiased;
      padding-bottom: env(safe-area-inset-bottom);
    }
    h1, h2, h3, .display { font-family: 'Bowlby One', 'Impact', sans-serif; font-weight: 400; letter-spacing: 0.01em; }
    .mono, time, .meta { font-family: 'Space Mono', ui-monospace, monospace; }
    button { font: inherit; cursor: pointer; }
    a { color: var(--ink); }
    img { display: block; max-width: 100%; }
    #boot {
      position: fixed; inset: 0; display: grid; place-items: center;
      background: var(--paper); z-index: 10000;
    }
    #boot .panel { text-align: center; padding: 2rem; }
    #boot h1 { font-size: 2.4rem; line-height: 1; }
    #boot .bar { margin-top: 1rem; height: 8px; background: var(--ink); position: relative; overflow: hidden; }
    #boot .bar::after {
      content: ""; position: absolute; inset: 0; background: var(--hot);
      animation: bootbar 1.4s ease-in-out infinite;
    }
    @keyframes bootbar { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }
  </style>
</head>
<body>
  <div id="boot">
    <div class="panel">
      <h1>better TGE</h1>
      <div class="mono" style="margin-top:.5rem; font-size:.85rem;">loading line-up&hellip;</div>
      <div class="bar"></div>
    </div>
  </div>
  <div id="root"></div>
  <div id="teleport-root"></div>
  <script src="index.mjs" type="module"></script>
</body>
</html>
