name: Scrape & Deploy

on:
  push:
    branches: [main]
  schedule:
    # Midday–midnight BST (11:00–23:00 UTC), May 13–16
    - cron: '0 11-23 13-16 5 *'
    # Midnight–3am BST (00:00–02:00 UTC), May 14–17 (next-morning wrap)
    - cron: '0 0-1 14-17 5 *'
  workflow_dispatch:
    inputs:
      force_regen_tracks:
        description: 'Regenerate tracks via OpenRouter (costs tokens)'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore scraper cache
        id: cache
        uses: actions/cache@v4
        with:
          path: scripts/cache
          key: scraper-cache-${{ github.run_id }}
          restore-keys: |
            scraper-cache-

      - name: Run scraper
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 scripts/build.py --rescrape ${{ inputs.force_regen_tracks == 'true' && '--regen-tracks' || '' }}

      - name: Stamp service worker with commit SHA
        run: |
          COMMIT_HASH=$(git rev-parse HEAD)
          sed -i "s/%VERSION%/$COMMIT_HASH/g" src/sw.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
